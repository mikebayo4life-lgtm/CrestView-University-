<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Management | Crestview University</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            display: flex;
            background: #f5f0e8;
            color: #1e293b;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #001a3a;
            color: white;
            padding: 28px 18px;
            position: fixed;
            border-right: 1px solid #c9a84c33;
        }

        .sidebar h2 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 1px solid #c9a84c33;
            font-size: 18px;
            letter-spacing: 0.5px;
            color: #c9a84c;
        }

        .sidebar a {
            display: block;
            color: #a8c4dc;
            text-decoration: none;
            padding: 10px 12px;
            margin-bottom: 4px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 400;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: #c9a84c14;
            color: #c9a84c;
            transform: translateX(4px);
        }

        .main {
            margin-left: 220px;
            width: calc(100% - 220px);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .topbar {
            background: #001a3a;
            padding: 18px 26px;
            border-bottom: 2px solid #c9a84c;
            margin-bottom: 0;
        }

        .topbar h1 {
            font-family: 'Playfair Display', serif;
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .form-box {
            background: white;
            padding: 24px 26px;
            border-radius: 12px;
            border: 1px solid #c9a84c33;
            border-top: 3px solid #c9a84c;
            margin: 24px 24px 20px;
        }

        .form-box h2 {
            font-family: 'Playfair Display', serif;
            color: #001a3a;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e8dfc8;
        }

        input {
            width: 100%;
            padding: 11px 14px;
            margin-bottom: 14px;
            border: 1px solid #e8dfc8;
            border-radius: 8px;
            outline: none;
            transition: 0.2s;
            font-size: 13px;
            color: #001a3a;
            background: #fdfaf4;
        }

        input::placeholder {
            color: #9ca3af;
        }

        input:focus {
            border-color: #c9a84c;
            background: #ffffff;
            box-shadow: 0 0 0 3px #c9a84c22;
        }

        button {
            background: linear-gradient(135deg, #c9a84c, #e8c96a);
            color: #001a3a;
            border: none;
            padding: 11px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.3px;
            transition: 0.2s;
        }

        button:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        .table-box {
            background: white;
            border-radius: 12px;
            border: 1px solid #c9a84c33;
            overflow: hidden;
            margin: 0 24px 24px;
        }

        .table-box h2 {
            font-family: 'Playfair Display', serif;
            color: #001a3a;
            font-size: 16px;
            font-weight: 600;
            padding: 16px 20px 14px;
            border-bottom: 1px solid #e8dfc8;
            background: #fdfaf4;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            background: #001a3a;
            color: #c9a84c;
            padding: 12px 16px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: left;
        }

        td {
            padding: 13px 16px;
            border-bottom: 1px solid #f0e8d8;
            text-align: left;
            font-size: 13px;
            color: #374151;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #fdfaf4;
        }

        .grade {
            padding: 4px 11px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 11px;
            display: inline-block;
            letter-spacing: 0.5px;
        }

        .A {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b766;
        }

        .B {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #93c5fd66;
        }

        .C {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fcd34d66;
        }

        .D {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a566;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                text-align: center;
            }

            .sidebar a {
                display: inline-block;
                margin: 5px;
            }

            .main {
                margin-left: 0;
                width: 100%;
            }

            .form-box,
            .table-box {
                margin-left: 16px;
                margin-right: 16px;
            }

            table {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>CU Admin</h2>

        <a href="dashboard.html">Dashboard</a>
        <a href="applications.html">Applications</a>
        <a href="students.html">Students</a>
        <a href="results.html">Results</a>
        <a href="./courses.html">Course Registration</a>
        <!-- <a href="../login.html">Logout</a> -->
    </div>

    <div class="main">

        <div class="topbar">
            <h1>Results Management</h1>
        </div>

        <div class="form-box">
            <h2>Upload Result</h2>

            <input type="text" id="matricNo" placeholder="Matric Number">
            <input type="text" id="course" placeholder="Course Title">
            <input type="number" id="score" placeholder="Score (0 - 100)">

            <button id="uploadBtn">Upload Result</button>
        </div>

        <div class="table-box">
            <h2>Uploaded Results</h2>

            <table>
                <thead>
                    <tr>
                        <th>Matric No</th>
                        <th>Course</th>
                        <th>Score</th>
                        <th>Grade</th>
                    </tr>
                </thead>

                <tbody id="resultTable">

                </tbody>
            </table>
        </div>

    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import {
            getFirestore,
            collection,
            addDoc,
            getDocs,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        import {
            getAuth,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjcNfeAoSv6l22eELrmnX82rs0Uh3TJ9I",
            authDomain: "school-management-f7a54.firebaseapp.com",
            projectId: "school-management-f7a54",
            storageBucket: "school-management-f7a54.firebasestorage.app",
            messagingSenderId: "333306723954",
            appId: "1:333306723954:web:36b88533e53aee10128ceb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        function getGrade(score) {
            if (score >= 70) return "A";
            if (score >= 60) return "B";
            if (score >= 50) return "C";
            return "D";
        }

        async function loadResults() {
            const table = document.getElementById("resultTable");
            table.innerHTML = "";

            const snapshot = await getDocs(collection(db, "results"));

            snapshot.forEach((doc) => {
                const data = doc.data();
                const grade = getGrade(Number(data.score));

                table.innerHTML += `
            <tr>
                <td>${data.matricNo}</td>
                <td>${data.course}</td>
                <td>${data.score}</td>
                <td><span class="grade ${grade}">${grade}</span></td>
            </tr>
        `;
            });
        }

        document.getElementById("uploadBtn").addEventListener("click", async () => {
            const matricNo = document.getElementById("matricNo").value;
            const course = document.getElementById("course").value;
            const score = document.getElementById("score").value;

            if (!matricNo || !course || !score) {
                alert("Please fill all fields");
                return;
            }

            await addDoc(collection(db, "results"), {
                // uid: user.uid,  
                matricNo,
                course,
                score: Number(score),
                createdAt: serverTimestamp()
            });

            alert("Result Uploaded Successfully!");

            document.getElementById("matricNo").value = "";
            document.getElementById("course").value = "";
            document.getElementById("score").value = "";

            loadResults();
        });

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "../login.html";
                return;
            }

            loadResults();
        });
    </script>

</body>

</html>
