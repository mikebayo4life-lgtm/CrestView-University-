<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results Management | Crestview University</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    display: flex;
    background: #f5f7fb;
    color: #1e293b;
}

.sidebar {
    width: 260px;
    height: 100vh;
    background: linear-gradient(180deg, #002147, #00152e);
    color: white;
    padding: 25px;
    position: fixed;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 35px;
    padding-bottom: 15px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    font-size: 20px;
}

.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    padding: 12px 14px;
    margin-bottom: 10px;
    border-radius: 10px;
    font-size: 14px;
    transition: 0.3s;
}

.sidebar a:hover {
    background: rgba(245, 158, 11, 0.15);
    color: #f59e0b;
    transform: translateX(5px);
}

.main {
    margin-left: 260px;
    width: calc(100% - 260px);
    padding: 25px;
}

.topbar {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(12px);
    padding: 18px 22px;
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    margin-bottom: 20px;
    border: 1px solid rgba(0,0,0,0.05);
}

.topbar h1 {
    color: #002147;
    font-size: 22px;
}

.form-box {
    background: white;
    padding: 25px;
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.06);
    margin-bottom: 25px;
}

.form-box h2 {
    margin-bottom: 15px;
    color: #002147;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    outline: none;
    transition: 0.3s;
    font-size: 14px;
}

input:focus {
    border-color: #f59e0b;
    box-shadow: 0 0 0 3px rgba(245,158,11,0.2);
}

button {
    background: #002147;
    color: white;
    border: none;
    padding: 12px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
}

button:hover {
    background: #003566;
    transform: translateY(-2px);
}

.table-box {
    background: white;
    padding: 22px;
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.06);
    overflow-x: auto;
}

.table-box h2 {
    margin-bottom: 15px;
    color: #002147;
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 600px;
}

th {
    background: #002147;
    color: white;
    padding: 14px;
    font-size: 14px;
}

td {
    padding: 14px;
    border-bottom: 1px solid #eee;
    text-align: center;
    font-size: 14px;
}

tr:hover {
    background: #f8fafc;
}

.grade {
    padding: 5px 10px;
    border-radius: 8px;
    font-weight: 700;
    color: white;
    display: inline-block;
}

.A { background: #16a34a; }
.B { background: #2563eb; }
.C { background: #f59e0b; }
.D { background: #ef4444; }


@media (max-width: 768px) {

body {
    flex-direction: column;
}

.sidebar {
    width: 100%;
    height: auto;
    position: relative;
    text-align: center;
}

.sidebar a {
    display: inline-block;
    margin: 5px;
}

.main {
    margin-left: 0;
    width: 100%;
}

table {
    font-size: 12px;
}
}

</style>
</head>

<body>

<div class="sidebar">
    <h2>CU Admin</h2>

    <a href="dashboard.html">Dashboard</a>
    <a href="applications.html">Applications</a>
    <a href="students.html">Students</a>
    <a href="results.html">Results</a>
    <a href="../login.html">Logout</a>
</div>

<div class="main">

    <div class="topbar">
        <h1>Results Management</h1>
    </div>

    <div class="form-box">
        <h2>Upload Result</h2>

        <input type="text" id="matricNo" placeholder="Matric Number">
        <input type="text" id="course" placeholder="Course Title">
        <input type="number" id="score" placeholder="Score (0 - 100)">

        <button id="uploadBtn">Upload Result</button>
    </div>

    <div class="table-box">
        <h2>Uploaded Results</h2>

        <table>
            <thead>
                <tr>
                    <th>Matric No</th>
                    <th>Course</th>
                    <th>Score</th>
                    <th>Grade</th>
                </tr>
            </thead>

            <tbody id="resultTable">

            </tbody>
        </table>
    </div>

</div>

</body>
</html>
