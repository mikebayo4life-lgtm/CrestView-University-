<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students | Crestview University</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f0f4fa;
            display: flex;
            color: #1e3a5f;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #0a1f44;
            color: white;
            padding: 0;
            position: fixed;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            text-align: center;
            padding: 25px 20px 18px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.18);
            font-size: 18px;
            font-weight: 600;
            color: #d4af37;
            letter-spacing: 0.4px;
            margin-bottom: 14px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(212, 175, 55, 0.65);
            text-decoration: none;
            padding: 12px 18px;
            margin: 0 10px 6px;
            border-radius: 10px;
            font-size: 14px;
            border-left: 3px solid transparent;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: rgba(212, 175, 55, 0.1);
            color: #d4af37;
            border-left-color: rgba(212, 175, 55, 0.5);
            transform: translateX(5px);
        }

        /* ── Main ── */
        .main {
            margin-left: 260px;
            width: calc(100% - 260px);
            padding: 25px;
        }

        /* ── Top bar ── */
        .topbar {
            background: #0a1f44;
            padding: 18px 24px;
            border-radius: 14px;
            margin-bottom: 20px;
            border: 0.5px solid rgba(212, 175, 55, 0.25);
            border-bottom: 3px solid #d4af37;
        }

        .topbar h1 {
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        /* ── Stat card ── */
        .card {
            background: white;
            padding: 22px;
            border-radius: 16px;
            border: 0.5px solid #d8e2f0;
            border-left: 4px solid #d4af37;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .card h3 {
            color: #7a90aa;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .card h1 {
            color: #0a1f44;
            font-size: 2rem;
            font-weight: 600;
        }

        /* ── Search box ── */
        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 0.5px solid #c8d5e8;
            outline: none;
            font-size: 14px;
            color: #1e3a5f;
            background: #ffffff;
            transition: 0.3s;
        }

        .search-box input::placeholder {
            color: rgba(10, 31, 68, 0.35);
        }

        .search-box input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.18);
        }

        /* ── Table box ── */
        .table-box {
            background: white;
            padding: 22px;
            border-radius: 18px;
            border: 0.5px solid #d8e2f0;
            overflow-x: auto;
        }

        .table-box h2 {
            margin-bottom: 15px;
            color: #0a1f44;
            font-size: 17px;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 650px;
        }

        th {
            background: #0a1f44;
            color: #d4af37;
            padding: 14px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            text-align: left;
        }

        th:first-child {
            border-radius: 8px 0 0 8px;
            padding-left: 18px;
        }

        th:last-child {
            border-radius: 0 8px 8px 0;
        }

        td {
            padding: 14px;
            text-align: left;
            border-bottom: 0.5px solid #edf1f7;
            font-size: 14px;
            color: #1e3a5f;
        }

        td:first-child {
            padding-left: 18px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #f7f9fd;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {

            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                text-align: center;
                flex-direction: row;
                flex-wrap: wrap;
                padding: 14px;
            }

            .sidebar h2 {
                width: 100%;
                padding: 0 0 10px;
                margin-bottom: 8px;
            }

            .sidebar a {
                display: inline-flex;
                margin: 4px;
            }

            .main {
                margin-left: 0;
                width: 100%;
            }

            th,
            td {
                text-align: center;
            }

            table {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>CU Admin</h2>

        <a href="dashboard.html">Dashboard</a>
        <a href="applications.html">Applications</a>
        <a href="students.html">Students</a>
        <a href="./courses.html">Course Registration</a>
        <a href="results.html">Results</a>
        <!-- <a href="../login.html">Logout</a> -->
    </div>

    <div class="main">

        <div class="topbar">
            <h1>Students Management</h1>
        </div>

        <div class="card">
            <h3>Total Students</h3>
            <h1 id="studentCount">0</h1>
        </div>

        <div class="search-box">
            <input type="text" id="searchStudent" placeholder="Search student by name, email or matric number...">
        </div>

        <div class="table-box">

            <h2>Approved Students</h2>

            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Matric Number</th>
                        <th>Programme</th>
                    </tr>
                </thead>

                <tbody id="studentTable">

                </tbody>
            </table>

        </div>

    </div>
    <script type="module" src="./student.js"></script>
</body>

</html>
