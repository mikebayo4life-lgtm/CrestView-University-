<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students | Crestview University</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f5f7fb;
            display: flex;
            color: #1e293b;
        }

        .sidebar {
            width: 260px;
            height: 100vh;
            background: linear-gradient(180deg, #002147, #00152e);
            color: white;
            padding: 25px;
            position: fixed;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 35px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px 14px;
            margin-bottom: 10px;
            border-radius: 10px;
            font-size: 14px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
            transform: translateX(5px);
        }

        .main {
            margin-left: 260px;
            width: calc(100% - 260px);
            padding: 25px;
        }

        .topbar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            padding: 18px 22px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .topbar h1 {
            color: #002147;
            font-size: 22px;
        }

        .card {
            background: white;
            padding: 22px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
            border-left: 4px solid #f59e0b;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .card h3 {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .card h1 {
            color: #002147;
            font-size: 2rem;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            outline: none;
            transition: 0.3s;
        }

        .search-box input:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
        }

        .table-box {
            background: white;
            padding: 22px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
            overflow-x: auto;
        }

        .table-box h2 {
            margin-bottom: 15px;
            color: #002147;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 650px;
        }

        th {
            background: #002147;
            color: white;
            padding: 14px;
            font-size: 14px;
        }

        td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        tr:hover {
            background: #f8fafc;
        }

        @media (max-width: 768px) {

            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                text-align: center;
            }

            .sidebar a {
                display: inline-block;
                margin: 5px;
            }

            .main {
                margin-left: 0;
                width: 100%;
            }

            table {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>CU Admin</h2>

        <a href="dashboard.html">Dashboard</a>
        <a href="applications.html">Applications</a>
        <a href="students.html">Students</a>
        <a href="results.html">Results</a>
        <a href="../login.html">Logout</a>
    </div>

    <div class="main">

        <div class="topbar">
            <h1>Students Management</h1>
        </div>

        <div class="card">
            <h3>Total Students</h3>
            <h1 id="studentCount">0</h1>
        </div>

        <div class="search-box">
            <input type="text" id="searchStudent" placeholder="Search student by name, email or matric number...">
        </div>

        <div class="table-box">

            <h2>Approved Students</h2>

            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Matric Number</th>
                        <th>Programme</th>
                    </tr>
                </thead>

                <tbody id="studentTable">

                </tbody>
            </table>

        </div>

    </div>
    <script type="module" src="./student.js"></script>
</body>

</html>
