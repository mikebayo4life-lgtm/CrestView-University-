<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undergraduate Application - Crestview University</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #f5f7fb;
            color: #333;
        }

        header {
            background: #002147;
            color: white;
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .logo span {
            color: #f59e0b;
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.08);
        }

        h2 {
            text-align: center;
            color: #002147;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        form {
            display: grid;
            gap: 18px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        label {
            font-weight: 600;
            margin-bottom: 5px;
            display: block;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: .3s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #f59e0b;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        .btn {
            background: #f59e0b;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
        }

        .btn:hover {
            background: #d97706;
            transform: translateY(-2px);
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
        }

        .login-link a {
            color: #002147;
            font-weight: bold;
            text-decoration: none;
        }

        .password-box {
            position: relative;
            width: 100%;
        }

        .password-box input {
            width: 100%;
            padding: 12px;
            padding-right: 45px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        .password-box input:focus {
            border-color: #003366;
        }

        .password-box i {
            position: absolute;
            right: 15px;
            top: 70%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
            font-size: 16px;
        }

        /* .password-box i:hover {
            color: #003366;
        } */

        footer {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        @media (max-width: 768px) {
            .row {
                grid-template-columns: 1fr;
            }

            .container {
                margin: 20px;
                padding: 25px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            Crestview <span>University</span>
        </div>
    </header>

    <div class="container">

        <h2>Undergraduate Application Form</h2>
        <p>Fill in your details carefully to apply for admission</p>

        <form id="applicationForm">

            <div class="row">
                <div>
                    <label>First Name</label>
                    <input type="text" id="firstName" placeholder="Enter first name">
                </div>

                <div>
                    <label>Last Name</label>
                    <input type="text" id="lastName" placeholder="Enter last name">
                </div>
            </div>

            <div class="row">
                <div>
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter email">
                </div>

                <div>
                    <label>Phone Number</label>
                    <input id="number" type="tel" placeholder="Enter phone number">
                </div>
            </div>

            <div class="row">
                <div>
                    <label>Gender</label>
                    <select id="gender">
                        <option value="">Select gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div>
                    <label>Date of Birth</label>
                    <input id="birth" type="date">
                </div>
            </div>

            <div class="row">
                <div>
                    <label>State of Origin</label>
                    <input type="text" placeholder="Enter state" id="state">
                </div>

                <div>
                    <label>Nationality</label>
                    <input type="text" placeholder="Enter nationality" id="nationality">
                </div>
            </div>

            <div class="row">
                <div>
                    <label>JAMB Score</label>
                    <input type="number" placeholder="Enter JAMB score" id="score">
                </div>

                <div>
                    <label>Preferred Course</label>
                    <select id="course">
                        <option value="">Select course</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Cyber Security">Cyber Security</option>
                        <option value="Software Engineering">Software Engineering</option>
                        <option value="Information Technology">Information Technology</option>
                        <option value="Data Science">Data Science</option>
                    </select>
                </div>
            </div>

            <div>
                <label>Home Address</label>
                <textarea placeholder="Enter your address" id="address"></textarea>
            </div>

            <div class="row">

                <div class="password-box">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Password">

                    <i class="fa-solid fa-eye" id="togglePassword"></i>

                </div>

                <div>
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm Password">
                </div>

            </div>

            <button type="submit" class="btn">
                Submit Application
            </button>
            <div class="login-link" style="text-align: center;">
                Already Applied?
                <a style="text-decoration: none; color: goldenrod;" href="check-status.html">Check Status</a>
            </div>
        </form>

    </div>

    <footer>
        © 2026 Crestview University | Undergraduate Admissions
    </footer>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import {
            getFirestore,
            collection,
            addDoc
        } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        import {
            getAuth,
            createUserWithEmailAndPassword
        } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjcNfeAoSv6l22eELrmnX82rs0Uh3TJ9I",
            authDomain: "school-management-f7a54.firebaseapp.com",
            projectId: "school-management-f7a54",
            storageBucket: "school-management-f7a54.firebasestorage.app",
            messagingSenderId: "333306723954",
            appId: "1:333306723954:web:36b88533e53aee10128ceb"
        };


        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app)



        const password = document.getElementById("password");
        const togglePassword = document.getElementById("togglePassword");

        togglePassword.addEventListener("click", () => {

            if (password.type === "password") {

                password.type = "text";
                togglePassword.classList.remove("fa-eye");
                togglePassword.classList.add("fa-eye-slash");

            } else {

                password.type = "password";
                togglePassword.classList.remove("fa-eye-slash");
                togglePassword.classList.add("fa-eye");

            }
        });

        const applicationForm = document.getElementById("applicationForm");

        applicationForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const firstName = document.getElementById("firstName").value;
            const lastName = document.getElementById("lastName").value;
            const email = document.getElementById("email").value;
            const number = document.getElementById("number").value;
            const gender = document.getElementById("gender").value;
            const birth = document.getElementById("birth").value;
            const state = document.getElementById("state").value;
            const nationality = document.getElementById("nationality").value;
            const score = document.getElementById("score").value;
            const course = document.getElementById("course").value;
            const address = document.getElementById("address").value;
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;


            if (password !== confirmPassword) {

                Swal.fire({
                    icon: "error",
                    title: "Passwords do not match"
                });

                return;
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(
                    auth,
                    email,
                    password
                );

                const user = userCredential.user;

                await addDoc(
                    collection(db, "applications"),
                    {
                        uid: user.uid,
                        firstName,
                        lastName,
                        email,
                        number,
                        gender,
                        birth,
                        state,
                        nationality,
                        score,
                        course,
                        address,

                        status: "Pending",

                        matricNumber: "",

                        createdAt: new Date()
                    }

                );
                // console.log(user);

                Swal.fire({
                    icon: "success",
                    title: "Application Submitted",
                    text: "Your application is pending approval."
                });
            } catch (error) {
                Swal.fire({
                    icon: "error",
                    title: "Application Failed",
                    text: error.message
                });

                console.log(error);
            }

            // setTimeout(() => {

            //     window.location.href =
            //         "check-status.html";

            // }, 7000);
        })


    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
