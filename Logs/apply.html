<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undergraduate Application - Crestview University</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        .badge {
            width: fit-content;
            margin: 0 auto 20px;
            background: rgba(201, 151, 0, .12);
            color: #C99700;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 700;
            border: 1px solid rgba(201, 151, 0, .3);
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(rgba(10, 35, 66, 0.88),
                    rgba(10, 35, 66, 0.88)),
                url("https://images.unsplash.com/photo-1562774053-701939374585?w=1600");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header {
            background: rgba(10, 35, 66, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 25px rgba(0, 0, 0, .2);
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .logo span {
            color: #C99700;
        }

        .container {
            max-width: 950px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            padding: 45px;
            border-radius: 25px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, .15),
                0 0 0 1px rgba(201, 151, 0, .15);
            border-top: 6px solid #C99700;
        }

        h2 {
            text-align: center;
            color: #0A2342;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        form {
            display: grid;
            gap: 20px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #0A2342;
            font-weight: 600;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            background: #fafafa;
            outline: none;
            transition: .3s;
            font-size: 15px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #C99700;
            background: white;
            box-shadow: 0 0 0 4px rgba(201, 151, 0, .15);
        }

        textarea {
            resize: none;
            height: 120px;
        }

        .password-box {
            position: relative;
        }

        .password-box input {
            padding-right: 50px;
        }

        .password-box i {
            position: absolute;
            right: 18px;
            top: 70%;
            transform: translateY(-50%);
            color: #777;
            cursor: pointer;
            transition: .3s;
        }

        .password-box i:hover {
            color: #C99700;
        }

        .btn {
            background: linear-gradient(135deg,
                    #C99700,
                    #f5b700);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: .5px;
            cursor: pointer;
            transition: .3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(201, 151, 0, .35);
        }

        .login-link {
            text-align: center;
            margin-top: 10px;
        }

        .login-link a {
            color: #C99700;
            font-weight: bold;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .back-home {
            position: absolute;
            top: 18px;
            left: 18px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .back-home:hover {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            transform: translateX(-3px);
        }

        footer {
            text-align: center;
            padding: 25px;
            color: white;
            font-weight: 500;
        }

        @media (max-width: 768px) {

            .container {
                margin: 20px;
                padding: 25px;
            }

            .row {
                grid-template-columns: 1fr;
            }

            h2 {
                font-size: 1.6rem;
            }
        }

        /* SweetAlert2 Luxurious Blue & Gold Styling */
        .swal2-popup {
            background: linear-gradient(135deg, rgba(15, 45, 85, 0.95), rgba(25, 60, 100, 0.95)) !important;
            backdrop-filter: blur(20px) !important;
            border: 2px solid rgba(245, 158, 11, 0.4) !important;
            border-radius: 20px !important;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.5), 0 0 40px rgba(245, 158, 11, 0.2) !important;
        }

        .swal2-title {
            color: #f59e0b !important;
            font-size: 1.8rem !important;
            font-weight: 700 !important;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3) !important;
        }

        .swal2-html-container {
            color: rgba(255, 255, 255, 0.9) !important;
            font-size: 1.05rem !important;
            line-height: 1.6 !important;
        }

        .swal2-confirm, .swal2-deny {
            padding: 12px 32px !important;
            border-radius: 10px !important;
            font-weight: 600 !important;
            border: none !important;
            transition: all 0.3s ease !important;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3) !important;
        }

        .swal2-confirm {
            background: linear-gradient(135deg, #f59e0b, #d97706) !important;
            color: white !important;
        }

        .swal2-confirm:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 15px 35px rgba(245, 158, 11, 0.4) !important;
        }

        .swal2-cancel {
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(245, 158, 11, 0.4) !important;
            color: #f59e0b !important;
        }

        .swal2-cancel:hover {
            background: rgba(245, 158, 11, 0.1) !important;
        }

        .swal2-icon {
            border: 3px solid rgba(245, 158, 11, 0.6) !important;
        }

        .swal2-icon.swal2-error .swal2-x-mark {
            color: #f59e0b !important;
        }

        .swal2-icon.swal2-error {
            background: rgba(245, 158, 11, 0.1) !important;
            border-color: #f59e0b !important;
        }

        .swal2-icon.swal2-success {
            background: rgba(34, 197, 94, 0.1) !important;
            border-color: #22c55e !important;
        }

        .swal2-icon.swal2-success .swal2-success-ring {
            border-color: rgba(34, 197, 94, 0.3) !important;
        }

        .swal2-icon.swal2-success [class*=swal2-success-line] {
            background: #22c55e !important;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(-30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
    </style>
</head>

<body>

    <header>
        <a href="../index.html" class="back-home">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="logo">
            Crestview <span>University</span>
        </div>
    </header>


    <div class="container">
        <div class="badge">
            2026 Admission Portal
        </div>

        <h2>Undergraduate Application Form</h2>
        <p>Fill in your details carefully to apply for admission</p>

        <form id="applicationForm">

            <div class="row">
                <div>
                    <label>First Name</label>
                    <input type="text" id="firstName" placeholder="Enter first name" required>
                </div>

                <div>
                    <label>Last Name</label>
                    <input type="text" id="lastName" placeholder="Enter last name" required>
                </div>
            </div>

            <div class="row">
                <div>
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter email" required>
                </div>

                <div>
                    <label>Phone Number</label>
                    <input id="number" type="number" placeholder="Enter phone number" required>
                </div>
            </div>

            <div class="row">
                <div>
                    <label>Gender</label>
                    <select id="gender">
                        <option value="">Select gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div>
                    <label>Date of Birth</label>
                    <input id="birth" type="date" required>
                </div>
            </div>

            <div class="row">
                <div>
                    <label>State of Origin</label>
                    <input type="text" placeholder="Enter state" id="state" required>
                </div>

                <div>
                    <label>Nationality</label>
                    <input type="text" placeholder="Enter nationality" id="nationality" required>
                </div>
            </div>

            <div class="row">
                <div>
                    <label>JAMB Score</label>
                    <input type="number" placeholder="Enter JAMB score" id="score" required>
                </div>

                <div>
                    <label>Preferred Course</label>
                    <select id="course" required>
                        <option value="">Select course</option>
                        <option value="Computer Science">BSc.Computer Science</option>
                        <option value="Cyber Security">BSc.Cyber Security</option>
                        <option value="Software Engineering">BSc.Software Engineering</option>
                        <option value="Information Technology">BSc.Information Technology</option>
                        <option value="Data Science">BSc.Data Science</option>
                    </select>
                </div>
            </div>

            <div>
                <label>Home Address</label>
                <textarea placeholder="Enter your address" id="address" required></textarea>
            </div>

            <div class="row">

                <div class="password-box">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Password" required>

                    <i class="fa-solid fa-eye" id="togglePassword"></i>

                </div>

                <div>
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm Password">
                </div>

            </div>

            <button type="submit" class="btn">
                Submit Application
            </button>
            <div class="login-link" style="text-align: center;">
                Already Applied?
                <a style="text-decoration: none; color: goldenrod;" href="check-status.html">Check Status</a>
            </div>
        </form>

    </div>

    <footer>
        © 2026 Crestview University | Undergraduate Admissions
    </footer>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import {
            getFirestore,
            collection,
            addDoc
        } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        import {
            getAuth,
            createUserWithEmailAndPassword
        } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjcNfeAoSv6l22eELrmnX82rs0Uh3TJ9I",
            authDomain: "school-management-f7a54.firebaseapp.com",
            projectId: "school-management-f7a54",
            storageBucket: "school-management-f7a54.firebasestorage.app",
            messagingSenderId: "333306723954",
            appId: "1:333306723954:web:36b88533e53aee10128ceb"
        };


        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app)



        const password = document.getElementById("password");
        const togglePassword = document.getElementById("togglePassword");

        togglePassword.addEventListener("click", () => {

            if (password.type === "password") {

                password.type = "text";
                togglePassword.classList.remove("fa-eye");
                togglePassword.classList.add("fa-eye-slash");

            } else {

                password.type = "password";
                togglePassword.classList.remove("fa-eye-slash");
                togglePassword.classList.add("fa-eye");

            }
        });

        const applicationForm = document.getElementById("applicationForm");

        applicationForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const firstName = document.getElementById("firstName").value;
            const lastName = document.getElementById("lastName").value;
            const email = document.getElementById("email").value;
            const number = document.getElementById("number").value;
            const gender = document.getElementById("gender").value;
            const birth = document.getElementById("birth").value;
            const state = document.getElementById("state").value;
            const nationality = document.getElementById("nationality").value;
            const score = document.getElementById("score").value;
            const course = document.getElementById("course").value;
            const address = document.getElementById("address").value;
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;


            if (password !== confirmPassword) {

                Swal.fire({
                    icon: "error",
                    title: "Passwords do not match",
                    html: '<span style="font-size: 1.05rem;">Please ensure both password fields match.</span>',
                    confirmButtonText: 'OK',
                    allowOutsideClick: false,
                    // didOpen: (modal) => {
                    //     modal.style.animation = 'slideIn 0.5s ease-out';
                    // }
                });

                return;
            }

            const nameRegex = /^[A-Za-z\s]+$/;

            if (!nameRegex.test(firstName)) {
                Swal.fire({
                    icon: "error",
                    title: "Invalid First Name",
                    html: '<span style="font-size: 1.05rem;">First name cannot contain numbers or special characters.</span>',
                    confirmButtonText: 'OK',
                    allowOutsideClick: false,
                    // didOpen: (modal) => {
                    //     modal.style.animation = 'slideIn 0.5s ease-out';
                    // }
                });
                return;
            }

            if (!nameRegex.test(lastName)) {
                Swal.fire({
                    icon: "error",
                    title: "Invalid Last Name",
                    html: '<span style="font-size: 1.05rem;">Last name cannot contain numbers or special characters.</span>',
                    confirmButtonText: 'OK',
                    allowOutsideClick: false,
                    // didOpen: (modal) => {
                    //     modal.style.animation = 'slideIn 0.5s ease-out';
                    // }
                });
                return;
            }

            if (!nameRegex.test(state)) {
                Swal.fire({
                    icon: "error",
                    title: "Invalid State",
                    html: '<span style="font-size: 1.05rem;">State of origin cannot contain numbers.</span>',
                    confirmButtonText: 'OK',
                    allowOutsideClick: false,
                    // didOpen: (modal) => {
                    //     modal.style.animation = 'slideIn 0.5s ease-out';
                    // }
                });
                return;
            }

            if (!nameRegex.test(nationality)) {
                Swal.fire({
                    icon: "error",
                    title: "Invalid Nationality",
                    html: '<span style="font-size: 1.05rem;">Nationality cannot contain numbers.</span>',
                    confirmButtonText: 'OK',
                    allowOutsideClick: false,
                    // didOpen: (modal) => {
                    //     modal.style.animation = 'slideIn 0.5s ease-out';
                    // }
                });
                return;
            }

            if (number.length < 11) {
                Swal.fire({
                    icon: "error",
                    title: "Invalid Phone Number",
                    html: '<span style="font-size: 1.05rem;">Phone number must be at least 11 digits.</span>',
                    confirmButtonText: 'OK',
                    allowOutsideClick: false,
                    // didOpen: (modal) => {
                    //     modal.style.animation = 'slideIn 0.5s ease-out';
                    // }
                });
                return;
            }

            if (number.length < 11) {
                Swal.fire({
                    icon: "error",
                    title: "Invalid Phone Number",
                    html: '<span style="font-size: 1.05rem;">Phone number must be at least 11 digits.</span>',
                    confirmButtonText: 'OK',
                    allowOutsideClick: false,
                 
                });
                return;
            }

            if (score < 0 || score > 400) {
                Swal.fire({
                    icon: "error",
                    title: "Invalid JAMB Score",
                    html: '<span style="font-size: 1.05rem;">JAMB score must be between 0 and 400.</span>',
                    confirmButtonText: 'OK',
                    allowOutsideClick: false,
                    // didOpen: (modal) => {
                    //     modal.style.animation = 'slideIn 0.5s ease-out';
                    // }
                });
                return;
            }
            // const nameRegex = /^[A-Za-z\s]+$/;

            if (!nameRegex.test(firstName, lastName, state, nationality)) {
                Swal.fire({
                    icon: "error",
                    title: "Invalid First Name",
                    html: '<span style="font-size: 1.05rem;">Only letters are allowed.</span>',
                    confirmButtonText: 'OK',
                    allowOutsideClick: false,
                    // didOpen: (modal) => {
                    //     modal.style.animation = 'slideIn 0.5s ease-out';
                    // }
                });
                return;
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(
                    auth,
                    email,
                    password
                );

                const user = userCredential.user;

                await addDoc(
                    collection(db, "applications"),
                    {
                        uid: user.uid,
                        firstName,
                        lastName,
                        email,
                        number,
                        gender,
                        birth,
                        state,
                        nationality,
                        score,
                        course,
                        address,

                        status: "Pending",

                        matricNumber: "",

                        createdAt: new Date()
                    }

                );
                // console.log(user);

                Swal.fire({
                    icon: "success",
                    title: "Application Submitted",
                    html: '<span style="font-size: 1.05rem;">Your application is pending approval.</span>',
                    confirmButtonText: 'Continue',
                    allowOutsideClick: false,
                    // didOpen: (modal) => {
                    //     modal.style.animation = 'slideIn 0.5s ease-out';
                    // }
                });
            } catch (error) {
                Swal.fire({
                    icon: "error",
                    title: "Application Failed",
                    html: `<span style="font-size: 1.05rem;">${error.message}</span>`,
                    confirmButtonText: 'Try Again',
                    allowOutsideClick: false,
                    // didOpen: (modal) => {
                    //     modal.style.animation = 'slideIn 0.5s ease-out';
                    // }
                });

                console.log(error);
            }

            // setTimeout(() => {

            //     window.location.href =
            //         "check-status.html";

            // }, 7000);
        })


    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
