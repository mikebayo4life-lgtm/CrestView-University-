<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Admission Status</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(rgba(10, 35, 66, .85),
                    rgba(10, 35, 66, .85)),
                url("https://images.unsplash.com/photo-1562774053-701939374585?auto=format&fit=crop&w=1600&q=80");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            padding: 45px;
            position: relative;
            border-radius: 25px;
            box-shadow:
                0 25px 60px rgba(0, 0, 0, .25);
            border-top: 6px solid #C99700;
        }

        .logo {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.7rem;
            font-weight: bold;
            color: #0A2342;
        }

        .logo span {
            color: #C99700;
        }

        .badge {
            width: fit-content;
            margin: 0 auto 20px;
            background: rgba(201, 151, 0, .12);
            color: #C99700;
            padding: 10px 18px;
            border-radius: 50px;
            font-weight: 600;
            border: 1px solid rgba(201, 151, 0, .3);
        }

        h1 {
            text-align: center;
            color: #0A2342;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 15px;
            transition: .3s;
        }

        input:focus {
            outline: none;
            border-color: #C99700;
            box-shadow: 0 0 0 4px rgba(201, 151, 0, .15);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg,
                    #0A2342,
                    #184d8a);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(10, 35, 66, .3);
        }

        .result {
            margin-top: 25px;
            padding: 25px;
            border-radius: 15px;
            background: #f8fafc;
            border-left: 5px solid #C99700;
            display: none;
        }

        .status {
            font-size: 1.2rem;
            font-weight: bold;
            color: #0A2342;
            text-align: center;
        }

        .matric {
            font-size: 1.6rem;
            font-weight: bold;
            color: #C99700;
            text-align: center;
            margin-top: 15px;
        }

        #message {
            text-align: center;
            margin-top: 15px;
            color: #555;
            line-height: 1.6;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 25px;
            text-decoration: none;
            color: #0A2342;
            font-weight: 600;
            transition: .3s;
        }

        .back-home {
            position: absolute;
            top: 18px;
            left: 18px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .back-home:hover {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            transform: translateX(-3px);
        }

        .back:hover {
            color: #C99700;
        }

        @media(max-width:768px) {

            .container {
                padding: 30px 25px;
            }

            h1 {
                font-size: 1.6rem;
            }
        }

        /* SweetAlert2 Luxurious Blue & Gold Styling */
        .swal2-popup {
            background: linear-gradient(135deg, rgba(15, 45, 85, 0.95), rgba(25, 60, 100, 0.95)) !important;
            backdrop-filter: blur(20px) !important;
            border: 2px solid rgba(245, 158, 11, 0.4) !important;
            border-radius: 20px !important;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.5), 0 0 40px rgba(245, 158, 11, 0.2) !important;
        }

        .swal2-title {
            color: #f59e0b !important;
            font-size: 1.8rem !important;
            font-weight: 700 !important;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3) !important;
        }

        .swal2-html-container {
            color: rgba(255, 255, 255, 0.9) !important;
            font-size: 1.05rem !important;
            line-height: 1.6 !important;
        }

        .swal2-confirm, .swal2-deny {
            padding: 12px 32px !important;
            border-radius: 10px !important;
            font-weight: 600 !important;
            border: none !important;
            transition: all 0.3s ease !important;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3) !important;
        }

        .swal2-confirm {
            background: linear-gradient(135deg, #f59e0b, #d97706) !important;
            color: white !important;
        }

        .swal2-confirm:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 15px 35px rgba(245, 158, 11, 0.4) !important;
        }

        .swal2-cancel {
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(245, 158, 11, 0.4) !important;
            color: #f59e0b !important;
        }

        .swal2-cancel:hover {
            background: rgba(245, 158, 11, 0.1) !important;
        }

        .swal2-icon {
            border: 3px solid rgba(245, 158, 11, 0.6) !important;
        }

        .swal2-icon.swal2-error .swal2-x-mark {
            color: #f59e0b !important;
        }

        .swal2-icon.swal2-error {
            background: rgba(245, 158, 11, 0.1) !important;
            border-color: #f59e0b !important;
        }

        .swal2-icon.swal2-success {
            background: rgba(34, 197, 94, 0.1) !important;
            border-color: #22c55e !important;
        }

        .swal2-icon.swal2-success .swal2-success-ring {
            border-color: rgba(34, 197, 94, 0.3) !important;
        }

        .swal2-icon.swal2-success [class*=swal2-success-line] {
            background: #22c55e !important;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(-30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
    </style>
</head>

<body>
    <a href="../index.html" class="back-home">
        <i class="fa-solid fa-arrow-left"></i>
    </a>
    <div class="container">

        <div class="logo">
            Crestview <span>University</span>
        </div>

        <div class="badge">
            Admission Portal 2026
        </div>
        <h1>Admission Status Checker</h1>

        <div class="typewriter" id="typing">
            <p class="subtitle">
                Enter the email address used during your application to check your admission status.
            </p>
        </div>

        <input type="email" id="email" placeholder="Enter your email address" required>

        <button id="checkBtn">
            Check Status
        </button>

        <div class="result" id="result">

            <p class="status" id="status"></p>

            <p class="matric" id="matric"></p>

            <br>

            <p id="message"></p>

        </div>


        <a href="login.html" class="back">
            Go To Login →
        </a>

    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

        import {
            getFirestore,
            collection,
            getDocs
        }
            from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjcNfeAoSv6l22eELrmnX82rs0Uh3TJ9I",
            authDomain: "school-management-f7a54.firebaseapp.com",
            projectId: "school-management-f7a54",
            storageBucket: "school-management-f7a54.firebasestorage.app",
            messagingSenderId: "333306723954",
            appId: "1:333306723954:web:36b88533e53aee10128ceb"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);


        document.getElementById("checkBtn").addEventListener("click", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value;

            console.log(email);

            const snapshot = await getDocs(
                collection(db, "applications")
            );

            let found = false;

            snapshot.forEach((doc) => {

                const data = doc.data();

                if (data.email === email) {

                    console.log(data);

                    found = true;


                    document.getElementById("result").style.display = "block";



                    if (data.status === "Pending") {
                        Swal.fire({
                            icon: 'info',
                            title: 'Application Pending',
                            html: '<span style="font-size: 1.05rem;">Your application is still under review. Please check back later.</span>',
                            confirmButtonText: 'OK',
                            allowOutsideClick: false,
                            // didOpen: (modal) => {
                            //     modal.style.animation = 'slideIn 0.5s ease-out';
                            // }
                        });
                        document.getElementById("status").innerHTML =
                            "Status: Pending ⏳";

                    }

                    else if (data.status === "Approved") {
                        Swal.fire({
                            icon: 'success',
                            title: 'Application Approved',
                            html: '<span style="font-size: 1.05rem;">Congratulations! Your application has been approved.</span>',
                            confirmButtonText: 'Continue',
                            allowOutsideClick: false,
                            // didOpen: (modal) => {
                            //     modal.style.animation = 'slideIn 0.5s ease-out';
                            // }
                        });
                        document.getElementById("status").innerHTML =
                            "Status: Approved ";

                        document.getElementById("matric").innerHTML =
                            `Matric Number: ${data.matricNumber}`;

                    }

                    else if (data.status === "Rejected") {
                        Swal.fire({
                            icon: 'error',
                            title: 'Application Rejected',
                            html: '<span style="font-size: 1.05rem;">Unfortunately, your application was not successful.</span>',
                            confirmButtonText: 'OK',
                            allowOutsideClick: false,
                            // didOpen: (modal) => {
                            //     modal.style.animation = 'slideIn 0.5s ease-out';
                            // }
                        });
                        document.getElementById("status").innerHTML =
                            "Status: Rejected ";

                        document.getElementById("matric").innerHTML = "";

                        document.getElementById("message").innerHTML =
                            "Unfortunately, your application was not successful.";

                    }

                }

                if (!found) {

                    Swal.fire({
                        icon: 'error',
                        title: 'Email Not Found',
                        html: '<span style="font-size: 1.05rem;">No application found for the provided email address.</span>',
                        confirmButtonText: 'Try Again',
                        allowOutsideClick: false,
                        // didOpen: (modal) => {
                        //     modal.style.animation = 'slideIn 0.5s ease-out';
                        // }
                    });
                    document.getElementById("result").style.display = "none";

                }


            });
        });

        // const text =
        //     "Check your admission status and retrieve your matric number.";

        // let index = 0;

        // function typeWriter() {

        //     if (index < text.length) {

        //         document.getElementById("typing")
        //             .innerHTML += text.charAt(index);

        //         index++;

        //         setTimeout(typeWriter, 50);
        //     }

        // }

        // typeWriter();


        // document
        //     .getElementById("checkBtn")
        //     .addEventListener("click", () => {

        //         document
        //             .getElementById("result")
        //             .style.display = "block";

        //     });

    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
