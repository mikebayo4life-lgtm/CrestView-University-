<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Admission Status</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(rgba(10, 35, 66, .85),
                    rgba(10, 35, 66, .85)),
                url("https://images.unsplash.com/photo-1562774053-701939374585?auto=format&fit=crop&w=1600&q=80");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            padding: 45px;
            border-radius: 25px;
            box-shadow:
                0 25px 60px rgba(0, 0, 0, .25);
            border-top: 6px solid #C99700;
        }

        .logo {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.7rem;
            font-weight: bold;
            color: #0A2342;
        }

        .logo span {
            color: #C99700;
        }

        .badge {
            width: fit-content;
            margin: 0 auto 20px;
            background: rgba(201, 151, 0, .12);
            color: #C99700;
            padding: 10px 18px;
            border-radius: 50px;
            font-weight: 600;
            border: 1px solid rgba(201, 151, 0, .3);
        }

        h1 {
            text-align: center;
            color: #0A2342;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 15px;
            transition: .3s;
        }

        input:focus {
            outline: none;
            border-color: #C99700;
            box-shadow: 0 0 0 4px rgba(201, 151, 0, .15);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg,
                    #0A2342,
                    #184d8a);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(10, 35, 66, .3);
        }

        .result {
            margin-top: 25px;
            padding: 25px;
            border-radius: 15px;
            background: #f8fafc;
            border-left: 5px solid #C99700;
            display: none;
        }

        .status {
            font-size: 1.2rem;
            font-weight: bold;
            color: #0A2342;
            text-align: center;
        }

        .matric {
            font-size: 1.6rem;
            font-weight: bold;
            color: #C99700;
            text-align: center;
            margin-top: 15px;
        }

        #message {
            text-align: center;
            margin-top: 15px;
            color: #555;
            line-height: 1.6;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 25px;
            text-decoration: none;
            color: #0A2342;
            font-weight: 600;
            transition: .3s;
        }

        .back:hover {
            color: #C99700;
        }

        @media(max-width:768px) {

            .container {
                padding: 30px 25px;
            }

            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="logo">
            Crestview <span>University</span>
        </div>

        <div class="badge">
            Admission Portal 2026
        </div>
        <h1>Admission Status Checker</h1>

        <div class="typewriter" id="typing">
            <p class="subtitle">
                Enter the email address used during your application to check your admission status.
            </p>
        </div>

        <input type="email" id="email" placeholder="Enter your email address" required>

        <button id="checkBtn">
            Check Status
        </button>

        <div class="result" id="result">

            <p class="status" id="status"></p>

            <p class="matric" id="matric"></p>

            <br>

            <p id="message"></p>

        </div>


        <a href="login.html" class="back">
            Go To Login →
        </a>

    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

        import {
            getFirestore,
            collection,
            getDocs
        }
            from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjcNfeAoSv6l22eELrmnX82rs0Uh3TJ9I",
            authDomain: "school-management-f7a54.firebaseapp.com",
            projectId: "school-management-f7a54",
            storageBucket: "school-management-f7a54.firebasestorage.app",
            messagingSenderId: "333306723954",
            appId: "1:333306723954:web:36b88533e53aee10128ceb"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);


        document.getElementById("checkBtn").addEventListener("click", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value;

            console.log(email);

            const snapshot = await getDocs(
                collection(db, "applications")
            );

            let found = false;

            snapshot.forEach((doc) => {

                const data = doc.data();

                if (data.email === email) {

                    console.log(data);

                    found = true;


                    document.getElementById("result").style.display = "block";



                    if (data.status === "Pending") {
                        Swal.fire({
                            icon: 'info',
                            title: 'Application Pending',
                            text: 'Your application is still under review. Please check back later.',
                        });
                        document.getElementById("status").innerHTML =
                            "Status: Pending ⏳";

                    }

                    else if (data.status === "Approved") {
                        Swal.fire({
                            icon: 'success',
                            title: 'Application Approved',
                            text: 'Congratulations! Your application has been approved.',
                        });
                        document.getElementById("status").innerHTML =
                            "Status: Approved ";

                        document.getElementById("matric").innerHTML =
                            `Matric Number: ${data.matricNumber}`;

                    }

                    else if (data.status === "Rejected") {
                        Swal.fire({
                            icon: 'error',
                            title: 'Application Rejected',
                            text: 'Unfortunately, your application was not successful.',
                        });
                        document.getElementById("status").innerHTML =
                            "Status: Rejected ";

                        document.getElementById("matric").innerHTML = "";

                        document.getElementById("message").innerHTML =
                            "Unfortunately, your application was not successful.";

                    }

                }

                if (!found) {

                    Swal.fire({
                        icon: 'error',
                        title: 'Email Not Found',
                        text: 'No application found for the provided email address.',
                    });
                    document.getElementById("result").style.display = "none";

                }


            });
        });

        // const text =
        //     "Check your admission status and retrieve your matric number.";

        // let index = 0;

        //         document.getElementById("typing")
        //             .innerHTML += text.charAt(index);

        //         index++;

        //         setTimeout(typeWriter, 50);
        //     }

        // }

        // typeWriter();

        //     .getElementById("checkBtn")

        //         document
        //             .getElementById("result")
        //             .style.display = "block";

        //     });

    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
