<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Crestview University</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(rgba(10, 35, 66, .85),
                    rgba(10, 35, 66, .85)),
                url("https://images.unsplash.com/photo-1562774053-701939374585?auto=format&fit=crop&w=1600&q=80");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-box {
            width: 420px;
            padding: 45px;
            position: relative;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            z-index: 2;
            color: white;
        }

        .logo {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #fff;
        }

        .logo span {
            color: #f59e0b;
        }

        h2 {
            text-align: center;
            margin-top: 10px;
            color: #ffffff;
            font-size: 1.6rem;
        }

        p {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .input-box {
            margin-bottom: 18px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.85rem;
        }

        input {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 12px rgba(245, 158, 11, 0.3);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .password-box {
            position: relative;
        }

        .password-box i {
            position: absolute;
            right: 12px;
            top: 70%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            transition: 0.3s;
        }

        .password-box i:hover {
            color: #f59e0b;
        }

        button {
            width: 100%;
            padding: 13px;
            margin-top: 18px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.25);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(245, 158, 11, 0.35);
        }

        .links {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .links a {
            color: #f59e0b;
            text-decoration: none;
            font-weight: 600;
        }

        .badge {
            width: fit-content;
            margin: 0 auto 20px;
            background: rgba(201, 151, 0, .12);
            color: #C99700;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 700;
            border: 1px solid rgba(201, 151, 0, .3);
        }

        .back-home {
            position: absolute;
            top: 18px;
            left: 18px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .back-home:hover {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            transform: translateX(-3px);
        }

        .links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 450px) {
            .login-box {
                width: 92%;
                padding: 30px;
            }
        }
    </style>
</head>

<body>
    <div class="login-box">
        <a href="../index.html" class="back-home">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="badge">
            2026 Admission Portal
        </div>
        <div class="logo">🎓 Crestview <span>University</span></div>

        <h2>Student Login</h2>
        <p>Sign in with your email and password</p>

        <form id="loginForm">

            <div class="input-box">
                <label>Email Address</label>
                <input id="email" type="email" placeholder="Enter your email" required>
            </div>

            <div class="input-box password-box">
                <label>Password</label>
                <input id="password" type="password" placeholder="Enter your password" required>
                <i class="fa-solid fa-eye" id="togglePassword"></i>
            </div>

            <button type="submit">Login</button>

        </form>

        <div class="links">
            <p>Don't have an account? <a href="apply.html">Apply Now</a></p>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjcNfeAoSv6l22eELrmnX82rs0Uh3TJ9I",
            authDomain: "school-management-f7a54.firebaseapp.com",
            projectId: "school-management-f7a54",
            storageBucket: "school-management-f7a54.firebasestorage.app",
            messagingSenderId: "333306723954",
            appId: "1:333306723954:web:36b88533e53aee10128ceb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const password = document.getElementById("password");
        const togglePassword = document.getElementById("togglePassword");

        togglePassword.addEventListener("click", () => {
            if (password.type === "password") {
                password.type = "text";
                togglePassword.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                password.type = "password";
                togglePassword.classList.replace("fa-eye-slash", "fa-eye");
            }
        });

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const pass = document.getElementById("password").value;

            try {
                await signInWithEmailAndPassword(auth, email, pass);

                window.location.href = "../Student/dashboard.html";

            } catch (error) {
                Swal.fire("Login failed", error.message, "error");
                console.error(error);
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
