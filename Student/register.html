<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Course Registration</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');

        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: #050b1a;
            color: #e4e9f7;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 230px;
            background: #0b1530;
            padding: 28px 18px;
            border-right: 1px solid rgba(212, 175, 55, 0.18);
            box-shadow: inset -1px 0 0 rgba(212, 175, 55, 0.06);
        }

        .sidebar h2 {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 19px;
            font-weight: 700;
            letter-spacing: 0.3px;
            margin-bottom: 26px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            position: relative;
        }

        .sidebar h2::after {
            content: "";
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 36px;
            height: 2px;
            background: #d4af37;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #7e8db0;
            text-decoration: none;
            padding: 12px 16px;
            margin: 5px 0;
            border-radius: 8px;
            border-left: 3px solid transparent;
            font-size: 13.5px;
            font-weight: 500;
            letter-spacing: 0.2px;
            transition: 0.3s ease;
        }

        .sidebar a.active,
        .sidebar a:hover {
            color: #f3d77a;
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.12), transparent);
            border-left-color: #d4af37;
        }

        /* ── Main ── */
        .main {
            flex: 1;
            padding: 32px 38px;
        }

        .topbar {
            margin-bottom: 26px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
        }

        .topbar h1 {
            font-family: 'Playfair Display', serif;
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            color: #f3d77a;
            letter-spacing: 0.3px;
        }

        .topbar .programme-tag {
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 4px;
            background: rgba(212, 175, 55, 0.08);
            border-left: 2px solid #d4af37;
            color: #aab8d6;
            font-size: 12.5px;
            letter-spacing: 0.4px;
        }

        /* ── Course box ── */
        .box {
            background: linear-gradient(165deg, rgba(212, 175, 55, 0.05), rgba(255, 255, 255, 0.02));
            border: 1px solid rgba(212, 175, 55, 0.22);
            border-radius: 10px;
            padding: 6px 22px;
            box-shadow: 0 1px 0 rgba(212, 175, 55, 0.1) inset;
        }

        .course-item {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
            padding: 18px 6px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            transition: background 0.25s ease, padding-left 0.25s ease;
        }

        .course-item:hover {
            background: rgba(212, 175, 55, 0.05);
            padding-left: 12px;
        }

        .course-item:last-child {
            border-bottom: none;
        }

        .course-item input {
            width: 19px;
            height: 19px;
            accent-color: #d4af37;
            cursor: pointer;
            flex-shrink: 0;
        }

        .course-info {
            flex: 1;
            min-width: 220px;
            cursor: pointer;
        }

        .course-code {
            display: block;
            font-weight: 700;
            color: #f3d77a;
            letter-spacing: 0.6px;
            font-size: 13.5px;
            text-transform: uppercase;
        }

        .course-name {
            margin-top: 5px;
            color: #d6deef;
            font-size: 15px;
            font-weight: 500;
        }

        .course-credits {
            margin-top: 7px;
            font-size: 11.5px;
            color: #6f7fa3;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .registered-badge {
            padding: 5px 13px;
            border-radius: 3px;
            background: rgba(115, 200, 170, 0.1);
            border-left: 2px solid #73c8aa;
            color: #9fe1cb;
            font-size: 11.5px;
            font-weight: 600;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        /* ── Button ── */
        button {
            margin-top: 22px;
            padding: 14px 26px;
            border: 1px solid #d4af37;
            border-radius: 6px;
            background: linear-gradient(135deg, #f3d77a, #c9971f);
            color: #0b1020;
            font-weight: 700;
            font-size: 13.5px;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(212, 175, 55, 0.22);
            background: linear-gradient(135deg, #f9e29a, #d4af37);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(212, 175, 55, 0.15);
            color: rgba(228, 233, 247, 0.35);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* ── Status & banners ── */
        .status-msg {
            margin-top: 14px;
            min-height: 18px;
            font-size: 13px;
            letter-spacing: 0.2px;
        }

        .status-msg.success {
            color: #9fe1cb;
        }

        .status-msg.success::before {
            content: "✓";
            margin-right: 6px;
        }

        .status-msg.error {
            color: #e8a98c;
        }

        .status-msg.error::before {
            content: "⚠";
            margin-right: 6px;
        }

        .locked-banner {
            display: none;
            margin-bottom: 22px;
            padding: 15px 20px;
            border-radius: 6px;
            background: rgba(115, 200, 170, 0.08);
            border-left: 3px solid #73c8aa;
            color: #9fe1cb;
            font-size: 14px;
        }

        .empty-state {
            padding: 40px;
            text-align: center;
            color: rgba(228, 233, 247, 0.4);
            font-size: 14px;
            letter-spacing: 0.2px;
        }

        .box.shake-error {
            border-color: rgba(232, 169, 140, 0.55);
            animation: shake 0.4s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        /* ── Responsive ── */
        @media (max-width: 820px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid rgba(212, 175, 55, 0.15);
            }

            .main {
                padding: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="layout">
        <div class="sidebar">
            <h2>Student Portal</h2>
            <a href="dashboard.html">Dashboard</a>
            <a href="profile.html">Profile</a>
            <a href="register.html" class="active">Course Registration</a>
            <a href="results.html">Results</a>
        </div>
        <div class="main">
            <div class="topbar">
                <h1>Course Registration</h1>
                <div class="programme-tag" id="programmeTag">Loading programme...</div>
            </div>
            <div class="locked-banner" id="lockedBanner">You have already registered courses.
            </div>
            <div class="box" id="courseList">
                <div class="empty-state">Loading courses...</div>
            </div>
            <button id="submitBtn">Register selected courses</button>
            <div class="status-msg" id="statusMsg"></div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import {
            getFirestore,
            collection,
            getDocs,
            addDoc,
            query,
            where
        } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        import {
            getAuth,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjcNfeAoSv6l22eELrmnX82rs0Uh3TJ9I",
            authDomain: "school-management-f7a54.firebaseapp.com",
            projectId: "school-management-f7a54",
            storageBucket: "school-management-f7a54.firebasestorage.app",
            messagingSenderId: "333306723954",
            appId: "1:333306723954:web:36b88533e53aee10128ceb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const courseList = document.getElementById("courseList");
        const submitBtn = document.getElementById("submitBtn");

        let programme = "";
        let matricNumber = "";

        async function loadPage(user) {

            const apps = await getDocs(collection(db, "applications"));

            const student = apps.docs
                .map(d => d.data())
                .find(d => d.uid === user.uid);

            if (!student) {
                courseList.innerHTML = "Student not found";
                return;
            }

            programme = student.course;
            matricNumber = student.matricNumber;

            const reg = await getDocs(
                query(
                    collection(db, "registrations"),
                    where("matricNumber", "==", matricNumber)
                )
            );

            if (!reg.empty) {
                submitBtn.disabled = true;
                submitBtn.textContent = "Already Registered";
            }

            function normalize(value) {
                return (value || "").trim().toLowerCase().replace(/\s+/g, " ");
            }

            function matchProgramme(courseProg, studentProg) {
                const a = normalize(courseProg);
                const b = normalize(studentProg);
                const synonyms = {
                    "cybersecurity": "cyber security",
                    "information tech": "information technology",
                    "it": "information technology"
                };
                const mappedA = synonyms[a] || a;
                const mappedB = synonyms[b] || b;
                return mappedA === mappedB;
            }

            const courses = await getDocs(collection(db, "courses"));

            const list = courses.docs
                .map(d => d.data())
                .filter(c => matchProgramme(c.programme, programme));

            courseList.innerHTML = list.map(c => `
        <label>
            <input type="checkbox"
                class="course"
                data-code="${c.courseCode}"
                data-name="${c.courseName}"
                data-credits="${c.credits}">
            ${c.courseCode} - ${c.courseName}
            (${c.credits} Credits)
        </label>
        <br><br>
    `).join("");
        }

        submitBtn.onclick = async () => {

            const selected = [...document.querySelectorAll(".course:checked")];

            if (!selected.length) {
                Swal.fire("Select a course");
                return;
            }

            const courses = selected.map(c => ({
                courseCode: c.dataset.code,
                courseName: c.dataset.name,
                credits: Number(c.dataset.credits)
            }));

            await addDoc(collection(db, "registrations"), {
                uid: auth.currentUser.uid,
                matricNumber,
                programme,
                courses
            });

            Swal.fire("Registration Successful");

            submitBtn.disabled = true;
            submitBtn.textContent = "Already Registered";
        };

        onAuthStateChanged(auth, user => {
            if (user) loadPage(user);
            // else location.href = "../Logs/login.html";
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
