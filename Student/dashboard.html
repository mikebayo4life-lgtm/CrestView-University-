<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Segoe UI, sans-serif;
        }

        body {
            background: #f4f7fc;
            display: flex;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            background: #0A2342;
            color: white;
            padding: 25px;
            position: fixed;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: #C99700;
        }

        .main {
            margin-left: 250px;
            width: 100%;
            padding: 30px;
        }

        .welcome {
            background: linear-gradient(135deg, #0A2342, #184d8a);
            color: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .08);
        }

        .card h3 {
            color: #555;
            margin-bottom: 10px;
        }

        .card h1 {
            color: #0A2342;
        }
    </style>
</head>

<body>

    <div class="sidebar">

        <h2>Student Portal</h2>

        <a href="dashboard.html">Dashboard</a>
        <a href="profile.html">Profile</a>
        <a href="results.html">Results</a>
        <a href="../login.html">Logout</a>

    </div>

    <div class="main">

        <div class="welcome">

            <h1 id="studentName">
                Welcome 
                
                👋
            </h1>

            <p id="matricNumber">
                Matric Number:
                <span id="number">Loading...</span>
            </p>

        </div>

        <div class="cards">

            <div class="card">
                <h3>Programme</h3>
                <h1 id="programme">
                 Loading...
                </h1>
            </div>

            <div class="card">
                <h3>Total Results</h3>
                <h1 id="resultCount">
                    0
                </h1>
            </div>

            <div class="card">
                <h3>CGPA</h3>
                <h1 id="cgpa">
                    0.00
                </h1>
            </div>

        </div>

    </div>

</body>

</html>
