<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #f0f4fa;
            display: flex;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 250px;
            height: 100vh;
            background: #0a2342;
            padding: 0;
            position: fixed;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 a {
            text-align: center;
            padding: 22px 20px 18px;
            font-size: 17px;
            font-weight: 600;
            color: #d4af37;
            letter-spacing: 0.4px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.18);
            margin-bottom: 14px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(212, 175, 55, 0.6);
            text-decoration: none;
            padding: 11px 20px;
            margin: 0 10px 4px;
            border-radius: 8px;
            font-size: 14px;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }

        .sidebar a button {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: rgba(10, 35, 66, 1);
            color: rgba(212, 175, 55, 0.6);
            text-decoration: none;
            /* padding: x; */
            /* margin: -1px; */
            border-radius: 8px;
            border: none;
            font-size: 14px;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }

        .sidebar a:hover {
            background: rgba(212, 175, 55, 0.1);
            color: #d4af37;
            border-left-color: rgba(212, 175, 55, 0.5);
        }

        .sidebar a.active {
            background: rgba(212, 175, 55, 0.12);
            color: #d4af37;
            border-left-color: #d4af37;
        }

        /* ── Main ── */
        .main {
            margin-left: 250px;
            width: calc(100% - 250px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        .topbar {
            background: #0a2342;
            border-bottom: 2px solid #d4af37;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .topbar h1 {
            font-size: 16px;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 0.3px;
        }

        /* ── Content area ── */
        .content {
            padding: 28px;
            flex: 1;
        }

        /* ── Welcome banner ── */
        .welcome {
            background: #0a2342;
            border: 0.5px solid rgba(212, 175, 55, 0.25);
            border-radius: 16px;
            padding: 24px 28px;
            margin: 1%;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .welcome-text small {
            display: block;
            font-size: 11px;
            color: rgba(212, 175, 55, 0.5);
            letter-spacing: 1.2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .welcome h1 {
            font-size: 22px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .welcome p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
        }

        .welcome p span {
            color: rgba(212, 175, 55, 0.85);
            font-family: 'Courier New', monospace;
        }

        .welcome-avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid rgba(212, 175, 55, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: #d4af37;
            flex-shrink: 0;
        }

        /* ── Stat cards ── */
        .cards {
            display: grid;
            margin: 3%;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .card {
            background: #ffffff;
            padding: 20px 22px;
            border-radius: 14px;
            border: 0.5px solid #d8e2f0;
            border-top: 3px solid #d4af37;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .card-icon {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            background: #0a2342;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
            color: #d4af37;
            font-size: 18px;
        }

        .card h3 {
            font-size: 11px;
            font-weight: 500;
            color: #7a90aa;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 7px;
        }

        .card h1 {
            font-size: 28px;
            font-weight: 600;
            color: #0a2342;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                flex-direction: row;
                flex-wrap: wrap;
                padding: 14px;
                gap: 6px;
            }

            .sidebar h2 {
                width: 100%;
                margin-bottom: 6px;
                padding: 0 0 10px;
            }

            .sidebar a {
                flex: 1;
                min-width: 90px;
                justify-content: center;
                padding: 8px 10px;
                margin: 0;
                text-align: center;
                font-size: 12px;
            }

            .main {
                margin-left: 0;
                width: 100%;
            }

            .welcome {
                flex-direction: column;
                gap: 14px;
                align-items: flex-start;
            }

            .welcome-avatar {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="sidebar">

        <h2><a href="../index.html">Student Portal</a></h2>

        <a href="dashboard.html">Dashboard</a>
        <a href="profile.html">Profile</a>
        <a href="results.html">Results</a>
        <a href="./register.html">Course Registration</a>
        <!-- <a href=""><button id="changePasswordBtn">
                Change Password
            </button>
        </a> -->
        <a href="" id="logout">Logout</a>

    </div>

    <div class="main">

        <div class="welcome">

            <h1 id="studentName">
                Welcome


            </h1>

            <p id="matricNumber">
                Matric Number:
                <span id="number">Loading...</span>
            </p>

        </div>

        <div class="cards">

            <div class="card">
                <h3>Programme</h3>
                <h1 id="programme">
                    Loading...
                </h1>
            </div>

            <div class="card">
                <h3>Total Results</h3>
                <h1 id="resultCount">
                    0
                </h1>
            </div>

            <div class="card">
                <h3>CGPA</h3>
                <h1 id="cgpa">
                    0.00
                </h1>
            </div>

        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import {
            getFirestore,
            collection,
            getDocs
        } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        import {
            getAuth,
            onAuthStateChanged,
            signOut,
            sendPasswordResetEmail
        } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjcNfeAoSv6l22eELrmnX82rs0Uh3TJ9I",
            authDomain: "school-management-f7a54.firebaseapp.com",
            projectId: "school-management-f7a54",
            storageBucket: "school-management-f7a54.firebasestorage.app",
            messagingSenderId: "333306723954",
            appId: "1:333306723954:web:36b88533e53aee10128ceb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        function getPoint(score) {
            if (score >= 70) return 5;
            if (score >= 60) return 4;
            if (score >= 50) return 3;
            if (score >= 45) return 2;
            return 1;
        }

        onAuthStateChanged(auth, async (user) => {

            if (!user) {
                window.location.href = new URL("../Logs/login.html", window.location.href).href;
                return;
            }

            const apps = await getDocs(collection(db, "applications"));

            let student = null;

            apps.forEach((doc) => {
                const data = doc.data();

                if (data.uid === user.uid) {
                    student = data;
                }
            });

            if (!student) return;

            document.getElementById("studentName").innerText =
                `Welcome ${student.firstName} ${student.lastName}`;

            document.getElementById("number").innerText =
                student.matricNumber;

            document.getElementById("programme").innerText =
                student.course;

            const resultsSnap = await getDocs(collection(db, "results"));

            let count = 0;
            let totalPoints = 0;

            resultsSnap.forEach((doc) => {
                const r = doc.data();

                if (r.matricNo === student.matricNumber) {

                    count++;
                    totalPoints += getPoint(Number(r.score));
                }
            });

            document.getElementById("resultCount").innerText = count;

            const cgpa = count === 0 ? 0 : (totalPoints / count);
            document.getElementById("cgpa").innerText = cgpa.toFixed(2);
        });

        document.getElementById("logout").addEventListener("click", async (e) => {
            e.preventDefault();
            await signOut(auth);

            window.location.replace("/Logs/login.html");

        });

        //             text: "A password reset link has been sent to your email."
        //         });

        //         Swal.fire({
        //             icon: "error",
        //             title: "Error",
        //             text: error.message
        //         });

        //     }

        // });
    </script>
</body>

</html>
