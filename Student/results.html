<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Results</title>

    <style>
        body {
            background: #f4f7fc;
            font-family: Segoe UI;
            padding: 30px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #0A2342;
            color: white;
            padding: 14px;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #0A2342;
        }

        .cgpa {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Academic Results</h2>

        <table>

            <thead>

                <tr>
                    <th>Course</th>
                    <th>Score</th>
                    <th>Grade</th>
                </tr>

            </thead>

            <tbody id="resultTable">

            </tbody>

        </table>

        <div class="cgpa">
         <span>CGPA:</span>
         <span id="cgpaValue">0.00</span>
        </div>

    </div>

</body>

</html>
